<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meditation" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Meditation Timer</title>
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --gold: #d4b483;
      --gold-dim: #8a7248;
      --red: #9b2424;
      --red-bright: #d03535;
      --text: #f0e6d0;
      --text-dim: #8a7a65;
      --ring: #1e1e2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ink wash background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, #1a1025 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 80%, #0d1520 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 20% 60%, #150d0d 0%, transparent 50%);
      pointer-events: none;
    }

    /* Subtle grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 2.5rem 1.5rem;
      width: 100%;
      max-width: 380px;
    }

    /* Chinese character header */
    .title-zh {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--gold-dim);
      letter-spacing: 0.5em;
      margin-bottom: 1.8rem;
    }

    .title-en {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    /* Gong ring */
    .gong-wrapper {
      position: relative;
      width: 270px;
      height: 270px;
      margin-bottom: 1.8rem;
    }

    .ring-outer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--gold-dim);
      opacity: 0.3;
    }

    .ring-progress {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
    }

    .ring-progress svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-progress circle {
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
    }

    .ring-track {
      stroke: var(--ring);
    }

    .ring-fill {
      stroke: var(--gold);
      stroke-dasharray: 565;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
    }

    .ring-fill.snooze {
      stroke: var(--gold-dim);
    }

    .gong-face {
      position: absolute;
      inset: 22px;
      background: radial-gradient(ellipse at 35% 35%, #1e1a14, #0d0b08);
      border-radius: 50%;
      border: 1px solid #2a2318;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s ease;
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,0.8),
        0 0 30px rgba(0,0,0,0.5);
    }

    .gong-face:active { transform: scale(0.97); }

    .gong-symbol {
      font-family: 'Noto Serif SC', serif;
      font-size: 3.8rem;
      font-weight: 300;
      color: var(--gold);
      opacity: 0.9;
      line-height: 1;
      margin-bottom: 0.3rem;
      transition: opacity 0.3s;
      user-select: none;
    }

    .gong-face:active .gong-symbol { opacity: 1; }

    .time-display {
      font-size: 3.4rem;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .time-display.running {
      color: var(--gold);
    }

    .phase-label {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 0.4rem;
    }

    .phase-label.active {
      color: var(--gold-dim);
    }

    /* Ripple on gong */
    .ripple-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--gold);
      opacity: 0;
      pointer-events: none;
    }

    .ripple-ring.animate {
      animation: ripple 2s ease-out forwards;
    }

    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.7; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    /* Morphing button */
    .controls {
      display: flex;
      justify-content: center;
      margin-bottom: 0;
    }

    .btn-morph {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.8rem 2.5rem;
      border-radius: 999px;
      border: 1px solid var(--gold);
      color: var(--gold);
      background: transparent;
      cursor: pointer;
      transition: all 0.4s ease;
      -webkit-appearance: none;
      outline: none;
      min-width: 140px;
    }

    .btn-morph:hover { background: rgba(212,180,131,0.12); }
    .btn-morph:active {
      background: rgba(212,180,131,0.2);
      outline: none;
    }

    .btn-morph.end-state {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-morph.end-state:hover { background: rgba(155,36,36,0.12); }
    .btn-morph.end-state:active {
      background: rgba(155,36,36,0.2);
    }

    /* Meditation mode — fade non-essential UI */
    .meditation-mode .title-zh,
    .meditation-mode .title-en,
    .meditation-mode .gong-symbol,
    .meditation-mode .settings,
    .meditation-mode .install-hint,
    .meditation-mode .ring-outer,
    .meditation-mode .ring-progress,
    .meditation-mode .snooze-dots,
    .meditation-mode .status-msg,
    .meditation-mode .custom-toggle {
      opacity: 0.06 !important;
      transition: opacity 1.5s ease;
    }

    .meditation-mode .gong-face {
      background: transparent !important;
      border-color: transparent !important;
      box-shadow: none !important;
    }

    .meditation-mode .phase-label {
      opacity: 0.3;
      transition: opacity 1.5s ease;
    }

    .container {
      transition: all 1.5s ease;
    }

    /* Custom toggle glyph */
    .custom-toggle {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.3rem;
      font-weight: 300;
      color: var(--gold-dim);
      cursor: pointer;
      user-select: none;
      letter-spacing: 0.3em;
      margin-top: 1.8rem;
      transition: color 0.3s, opacity 0.3s;
      opacity: 0.5;
    }
    .custom-toggle:active { opacity: 1; }
    .custom-toggle.open { color: var(--gold); opacity: 0.85; }

    /* Settings drawer */
    .settings {
      width: 100%;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.4s ease;
      padding-top: 0;
    }

    .settings.open {
      max-height: 200px;
      opacity: 1;
      padding-top: 1.5rem;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .setting-label {
      font-size: 0.9rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .setting-control {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .setting-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid var(--gold-dim);
      background: transparent;
      color: var(--gold);
      font-size: 1.6rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      outline: none;
    }

    .setting-btn:hover { background: var(--gold-dim); color: var(--bg); }
    .setting-btn:disabled { opacity: 0.2; cursor: default; }

    .setting-value {
      font-size: 1.2rem;
      font-weight: 300;
      color: var(--text);
      min-width: 2.5rem;
      text-align: center;
    }

    /* Snooze dots */
    .snooze-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 0.75rem;
      min-height: 10px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold-dim);
      opacity: 0.4;
      transition: all 0.4s ease;
    }

    .dot.active { opacity: 1; background: var(--gold); }

    /* Gong pulse animation */
    @keyframes gongPulse {
      0%   { box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 0 30px rgba(0,0,0,0.5), 0 0 0 rgba(200,169,110,0); }
      20%  { box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 0 30px rgba(0,0,0,0.5), 0 0 40px rgba(200,169,110,0.3); }
      100% { box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 0 30px rgba(0,0,0,0.5), 0 0 0 rgba(200,169,110,0); }
    }

    .gong-face.striking {
      animation: gongPulse 2.5s ease-out;
    }

    /* Install prompt */
    .install-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      opacity: 0.5;
      white-space: nowrap;
    }

    .status-msg {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 0.5rem;
      min-height: 1rem;
      transition: color 0.4s;
    }

    .status-msg.active { color: var(--gold-dim); }
  </style>
</head>
<body>

<div class="container">
  <div class="title-zh" id="titleZh" onclick="toggleMode()" style="cursor:pointer; user-select:none;">冥想</div>


  <div class="gong-wrapper">
    <div class="ring-outer"></div>
    <div class="ripple-ring" id="ripple"></div>
    <div class="ring-progress">
      <svg viewBox="0 0 204 204">
        <circle class="ring-track" cx="102" cy="102" r="90"/>
        <circle class="ring-fill" id="ringFill" cx="102" cy="102" r="90"/>
      </svg>
    </div>
    <div class="gong-face" id="gongFace" onclick="onGongTap()">
      <div class="gong-symbol">鑼</div>
      <div class="time-display" id="timeDisplay">15:00</div>
      <div class="phase-label" id="phaseLabel"></div>
    </div>
  </div>

  <div class="snooze-dots" id="snoozeDots"></div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="controls">
    <button class="btn-morph" id="morphBtn" onclick="onMorphTap(); this.blur()">Begin</button>
  </div>

  <div class="custom-toggle" id="customToggle" onclick="toggleSettings()">調</div>

  <div class="settings" id="settingsDrawer">
<div class="setting-row">
      <span class="setting-label">meditate</span>
      <div class="setting-control">
        <button class="setting-btn" id="medMinus" onclick="adjustSetting('med', -1)">−</button>
        <span class="setting-value" id="medValue">15</span>
        <button class="setting-btn" onclick="adjustSetting('med', 1)">+</button>
      </div>
    </div>

    <div class="setting-row">
      <span class="setting-label">reminder</span>
      <div class="setting-control">
        <button class="setting-btn" id="snoozeMinus" onclick="adjustSetting('snooze', -1)">−</button>
        <span class="setting-value" id="snoozeValue">5</span>
        <button class="setting-btn" onclick="adjustSetting('snooze', 1)">+</button>
      </div>
    </div>
  </div>
</div>



<script>
// ─── State ───────────────────────────────────────────────────────
let medMinutes  = 15;
let snoozeMinutes = 5;
let timerInterval = null;
let secondsLeft = medMinutes * 60;
let isRunning = false;
let isSnoozing = false;
let snoozeCount = 0;
let totalSeconds = medMinutes * 60;
let audioCtx = null;
let wakeLock = null;
let isTealMode = false;

// ─── Settings drawer ────────────────────────────────────────────
function toggleSettings() {
  const drawer = document.getElementById('settingsDrawer');
  const toggle = document.getElementById('customToggle');
  const isOpen = drawer.classList.toggle('open');
  toggle.classList.toggle('open', isOpen);
}

// ─── Mode toggle ─────────────────────────────────────────────────
function toggleMode() {
  if (isRunning) return; // don't switch mid-session
  isTealMode = !isTealMode;
  const title = document.getElementById('titleZh');
  if (isTealMode) {
    title.textContent = '茶時';
    medMinutes = 2;
    snoozeMinutes = 1;
  } else {
    title.textContent = '冥想';
    medMinutes = 15;
    snoozeMinutes = 5;
  }
  secondsLeft = medMinutes * 60;
  totalSeconds = medMinutes * 60;
  document.getElementById('medValue').textContent = medMinutes;
  document.getElementById('snoozeValue').textContent = snoozeMinutes;
  document.getElementById('timeDisplay').textContent = formatTime(secondsLeft);
  updateRing(totalSeconds, totalSeconds);
}
let morphState = 'begin'; // 'begin' | 'end'

// ─── Audio: deep Chinese gong via Web Audio API ───────────────────
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    initGong();
  }
  return audioCtx;
}

VVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVTEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV";
let gongAudioBuffer = null;

async function initGong() {
  try {
    const ctx = getAudioCtx();
    await ctx.resume();
    const b64 = GONG_SRC.split(',')[1];
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    // slice() copies the buffer so decodeAudioData can take ownership safely
    gongAudioBuffer = await ctx.decodeAudioData(bytes.buffer.slice(0));
    console.log('Gong loaded OK, duration:', gongAudioBuffer.duration.toFixed(1) + 's');
  } catch(e) { console.warn('Gong load failed:', e); }
}

function playGong() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  if (!gongAudioBuffer) { console.warn('Gong not ready'); return; }
  const src = ctx.createBufferSource();
  src.buffer = gongAudioBuffer;
  const gain = ctx.createGain();
  gain.gain.value = 1.0;
  src.connect(gain);
  gain.connect(ctx.destination);
  src.start(ctx.currentTime);
}

async function onGongTap() {
  // First tap initializes audio context — wait for buffer to decode before striking
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') await ctx.resume();
  if (!gongAudioBuffer) await initGong();
  strikeGong();
  if (!isRunning) {
    const label = document.getElementById('phaseLabel');
    label.textContent = '· · ·';
    setTimeout(() => { label.textContent = ''; }, 3000);
  }
}

function strikeGong() {
  playGong();
  const face = document.getElementById('gongFace');
  const ripple = document.getElementById('ripple');
  face.classList.remove('striking');
  void face.offsetWidth;
  face.classList.add('striking');
  ripple.classList.remove('animate');
  void ripple.offsetWidth;
  ripple.classList.add('animate');
  setTimeout(() => face.classList.remove('striking'), 3000);
}

// ─── Timer logic ─────────────────────────────────────────────────
function formatTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function updateRing(secondsLeft, totalSecs) {
  const circumference = 2 * Math.PI * 90; // ~565.5
  const fraction = secondsLeft / totalSecs;
  const offset = circumference * (1 - fraction);
  const ring = document.getElementById('ringFill');
  ring.style.strokeDashoffset = offset;
  ring.classList.toggle('snooze', isSnoozing);
}

function updateSnoozeDots() {
  const container = document.getElementById('snoozeDots');
  container.innerHTML = '';
  if (snoozeCount === 0 && !isSnoozing) return;
  const total = snoozeCount + (isSnoozing ? 1 : 0);
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === total - 1 && isSnoozing ? ' active' : '');
    container.appendChild(dot);
  }
}

function tick() {
  secondsLeft--;
  document.getElementById('timeDisplay').textContent = formatTime(secondsLeft);
  updateRing(secondsLeft, totalSeconds);

  if (secondsLeft <= 0) {
    strikeGong();
    // Start snooze
    isSnoozing = true;
    snoozeCount++;
    totalSeconds = snoozeMinutes * 60;
    secondsLeft = totalSeconds;
    updateSnoozeDots();
    document.getElementById('phaseLabel').textContent = `snooze ${snoozeCount}`;
    document.getElementById('phaseLabel').classList.add('active');
    document.getElementById('statusMsg').textContent = `extending · ${snoozeMinutes} min`;
    document.getElementById('statusMsg').classList.add('active');
    updateRing(secondsLeft, totalSeconds);
  }
}

// ─── Wake Lock ───────────────────────────────────────────────────
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch (e) { console.log('Wake Lock failed:', e); }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// ─── Fullscreen ──────────────────────────────────────────────────
function enterFullscreen() {
  const el = document.documentElement;
  const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if (rfs) rfs.call(el).catch(() => {});
}

function exitFullscreen() {
  const efs = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
  if (efs && document.fullscreenElement) efs.call(document).catch(() => {});
}

// Re-enter fullscreen + re-acquire wake lock if accidentally exited during session
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && running) {
    // Small delay to avoid rapid re-entry loops
    setTimeout(() => {
      if (running) {
        enterFullscreen();
        requestWakeLock();
      }
    }, 300);
  }
});
document.addEventListener('webkitfullscreenchange', () => {
  if (!document.webkitFullscreenElement && running) {
    setTimeout(() => {
      if (running) {
        enterFullscreen();
        requestWakeLock();
      }
    }, 300);
  }
});

// ─── Morphing button ────────────────────────────────────────────
function onMorphTap() {
  if (morphState === 'begin') {
    startTimer();
  } else if (morphState === 'end') {
    stopTimer();
  }
}

async function startTimer() {
  if (isRunning) return;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') await ctx.resume();
  if (!gongAudioBuffer) await initGong();

  isRunning = true;
  isSnoozing = false;
  snoozeCount = 0;
  secondsLeft = medMinutes * 60;
  totalSeconds = medMinutes * 60;

  // Morph button to End
  morphState = 'end';
  const btn = document.getElementById('morphBtn');
  btn.textContent = 'End';
  btn.classList.add('end-state');

  document.getElementById('timeDisplay').classList.add('running');
  document.getElementById('phaseLabel').textContent = 'meditating';
  document.getElementById('phaseLabel').classList.add('active');
  document.querySelectorAll('.setting-btn').forEach(b => b.disabled = true);

  // Enter meditation mode
  document.querySelector('.container').classList.add('meditation-mode');

  // Wake Lock + Fullscreen
  await requestWakeLock();
  enterFullscreen();

  updateRing(secondsLeft, totalSeconds);
  updateSnoozeDots();

  timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  if (!isRunning) return;
  clearInterval(timerInterval);
  timerInterval = null;
  isRunning = false;
  isSnoozing = false;

  secondsLeft = medMinutes * 60;
  totalSeconds = medMinutes * 60;
  snoozeCount = 0;

  // Morph button back to Begin
  morphState = 'begin';
  const btn = document.getElementById('morphBtn');
  btn.textContent = 'Begin';
  btn.classList.remove('end-state');

  document.getElementById('timeDisplay').textContent = formatTime(secondsLeft);
  document.getElementById('timeDisplay').classList.remove('running');
  document.getElementById('phaseLabel').textContent = '';
  document.getElementById('phaseLabel').classList.remove('active');
  document.getElementById('statusMsg').textContent = '';
  document.getElementById('statusMsg').classList.remove('active');
  document.querySelectorAll('.setting-btn').forEach(b => b.disabled = false);
  document.getElementById('snoozeDots').innerHTML = '';

  // Exit meditation mode
  document.querySelector('.container').classList.remove('meditation-mode');

  // Release Wake Lock + exit fullscreen
  releaseWakeLock();
  exitFullscreen();

  updateRing(totalSeconds, totalSeconds);
}

// ─── Settings ────────────────────────────────────────────────────
function adjustSetting(type, delta) {
  if (type === 'med') {
    medMinutes = Math.max(1, Math.min(120, medMinutes + delta));
    document.getElementById('medValue').textContent = medMinutes;
    if (!isRunning) {
      secondsLeft = medMinutes * 60;
      totalSeconds = medMinutes * 60;
      document.getElementById('timeDisplay').textContent = formatTime(secondsLeft);
      updateRing(totalSeconds, totalSeconds);
    }
  } else {
    snoozeMinutes = Math.max(1, Math.min(30, snoozeMinutes + delta));
    document.getElementById('snoozeValue').textContent = snoozeMinutes;
  }
}

// ─── PWA service worker ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  // Inline SW via blob
  const swCode = `
    const CACHE = 'meditation-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/meditation-timer.html'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(() => {});
}

// Hide install hint after 5s
setTimeout(() => {
  const h = document.getElementById('installHint');
  if (h) h.style.transition = 'opacity 1s', h.style.opacity = '0';
}, 5000);

// Init display
document.getElementById('timeDisplay').textContent = formatTime(secondsLeft);
updateRing(totalSeconds, totalSeconds);
</script>
